name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.3"
        bundler-cache: true

    - name: Verify tag matches gem version
      run: |
        version=$(ruby -e 'require_relative "lib/llm_cost_tracker/version"; print LlmCostTracker::VERSION')
        test "v${version}" = "${GITHUB_REF_NAME}"

    - name: Run release checks
      run: |
        bundle exec rubocop
        bundle exec rspec

    - name: Publish gem
      uses: rubygems/release-gem@v1

    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
