name: Refresh provider prices

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      providers:
        description: "Comma-separated provider names to refresh"
        default: "anthropic,gemini"
      dry_run:
        description: "Run without writing or opening a PR"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run price scrape
        env:
          PROVIDERS: ${{ github.event.inputs.providers || 'anthropic,gemini' }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: |
          set -o pipefail
          bundle exec ruby scripts/price_scrape/runner.rb 2>&1 | tee refresh.log

      - name: Detect price changes
        id: changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          if git diff --quiet lib/llm_cost_tracker/prices.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no price changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "price changes detected"
          fi

      - name: Close stale auto-refresh PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_pr=$(gh pr list \
            --state open \
            --head prices/auto-refresh \
            --json number \
            --jq '.[0].number')
          if [ -n "$open_pr" ]; then
            gh pr close "$open_pr" \
              --comment "Superseded by today's price refresh." \
              --delete-branch
            echo "closed stale PR #${open_pr}"
          else
            echo "no open auto-refresh PR to close"
          fi

      - name: Build PR body
        if: steps.changes.outputs.changed == 'true'
        run: |
          {
            echo "Automated price refresh from upstream provider pricing pages."
            echo
            echo "Triggered by \`${{ github.event_name }}\` on $(date -u +"%Y-%m-%d %H:%M UTC")."
            echo
            echo "## Runner output"
            echo
            echo '```'
            cat refresh.log
            echo '```'
            echo
            echo "Review the diff to confirm new models, deprecated removals, and price field changes."
          } > pr_body.md

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: prices/auto-refresh
          title: "chore(prices): refresh provider snapshots"
          commit-message: "Refresh provider price snapshots"
          body-path: pr_body.md
          delete-branch: true
          labels: prices,automated
          add-paths: lib/llm_cost_tracker/prices.json

      - name: Open issue on provider failure
        if: failure() && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_ASSIGN_TOKEN: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          test -f refresh.log || { echo "no refresh.log to inspect"; exit 0; }

          assign_copilot() {
            issue_number="$1"
            provider="$2"
            base_branch="${BASE_BRANCH:-main}"

            if [ -z "$COPILOT_ASSIGN_TOKEN" ]; then
              echo "COPILOT_ASSIGN_TOKEN not configured; skipping Copilot assignment for issue #${issue_number}"
              return 0
            fi

            assignees=$(GH_TOKEN="$COPILOT_ASSIGN_TOKEN" gh issue view "$issue_number" \
              --json assignees \
              --jq '.assignees[].login' 2>/dev/null || true)
            if printf '%s\n' "$assignees" | grep -Eq '^(copilot-swe-agent|copilot-swe-agent\[bot\])$'; then
              echo "issue #${issue_number} is already assigned to Copilot"
              return 0
            fi

            payload_file=$(mktemp)
            {
              echo '{'
              echo '  "assignees": ["copilot-swe-agent[bot]"],'
              echo '  "agent_assignment": {'
              echo "    \"target_repo\": \"${GITHUB_REPOSITORY}\","
              echo "    \"base_branch\": \"${base_branch}\","
              echo "    \"custom_instructions\": \"Fix the ${provider} parser-broken issue. Follow .github/copilot-instructions.md. Limit changes to the provider parser, fixture, and spec unless the issue proves impossible within that scope.\","
              echo '    "custom_agent": "",'
              echo '    "model": ""'
              echo '  }'
              echo '}'
            } > "$payload_file"

            if GH_TOKEN="$COPILOT_ASSIGN_TOKEN" gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${GITHUB_REPOSITORY}/issues/${issue_number}/assignees" \
              --input "$payload_file" >/dev/null; then
              echo "assigned issue #${issue_number} to Copilot"
            else
              echo "failed to assign issue #${issue_number} to Copilot"
            fi
            rm -f "$payload_file"
          }

          failed_providers=$(grep -oE '^\[[a-z_-]+\] FAILED' refresh.log \
            | sed -E 's/^\[([a-z_-]+)\] FAILED$/\1/' \
            | sort -u)
          if [ -z "$failed_providers" ]; then
            echo "no provider-specific failure marker in log"
            exit 0
          fi

          gh label create parser-broken \
            --color D73A4A \
            --description "Price scraper parser failure" 2>/dev/null || true

          for provider in $failed_providers; do
            gh label create "provider:${provider}" \
              --color BFDADC \
              --description "Affects ${provider} provider" 2>/dev/null || true

            existing=$(gh issue list \
              --label parser-broken \
              --label "provider:${provider}" \
              --state open \
              --json number \
              --jq '.[0].number // empty')

            body_file=$(mktemp)
            {
              echo "Provider \`${provider}\` failed during automated price refresh."
              echo
              echo "**Provider:** ${provider}"
              echo "**Workflow run:** ${RUN_URL}"
              echo "**Parser:** [scripts/price_scrape/providers/${provider}.rb](${REPO_URL}/blob/main/scripts/price_scrape/providers/${provider}.rb)"
              echo "**Time:** $(date -u +"%Y-%m-%d %H:%M UTC")"
              echo
              echo "Assign this issue to GitHub Copilot cloud agent to repair the parser. The agent should follow \`.github/copilot-instructions.md\`, refresh the fixture, update the provider parser/spec, run \`bin/check\`, and open a PR that closes this issue."
              echo
              echo "## Runner output"
              echo
              echo '```'
              cat refresh.log
              echo '```'
            } > "$body_file"

            if [ -n "$existing" ]; then
              gh issue comment "$existing" --body-file "$body_file"
              echo "commented on issue #${existing} for ${provider}"
              assign_copilot "$existing" "$provider"
            else
              if issue_url=$(gh issue create \
                --title "Price scraper for ${provider} is broken" \
                --label "parser-broken,provider:${provider}" \
                --body-file "$body_file"); then
                issue_number="${issue_url##*/}"
                echo "created issue #${issue_number} for ${provider}"
                assign_copilot "$issue_number" "$provider"
              else
                echo "failed to create issue for ${provider}"
              fi
            fi
            rm -f "$body_file"
          done
